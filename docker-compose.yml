services:
  mysql:
    image: mysql:8.0
    container_name: festival-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-knu_festival}
      MYSQL_USER: ${MYSQL_USER:-festival}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-festival}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --default-time-zone=+09:00
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} | grep -q 'mysqld is alive'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: festival-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: festival-server:local
    container_name: festival-app
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-knu_festival}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      DB_USERNAME: ${MYSQL_USER:-festival}
      DB_PASSWORD: ${MYSQL_PASSWORD:-festival}
      DDL_AUTO: ${DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      PHONE_ENCRYPTION_KEY: ${PHONE_ENCRYPTION_KEY:?PHONE_ENCRYPTION_KEY required}
      PHONE_LOOKUP_HASH_KEY: ${PHONE_LOOKUP_HASH_KEY:?PHONE_LOOKUP_HASH_KEY required}
      ADMIN_MASTER_PASSWORD: ${ADMIN_MASTER_PASSWORD:?ADMIN_MASTER_PASSWORD required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SERVER_PORT: 8080
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      MATCHING_FESTIVAL_DAYS: ${MATCHING_FESTIVAL_DAYS:-2026-05-20,2026-05-21,2026-05-22}
      UPLOAD_BASE_DIR: /app/uploads
      SOLAPI_API_KEY: ${SOLAPI_API_KEY:-}
      SOLAPI_API_SECRET: ${SOLAPI_API_SECRET:-}
      SOLAPI_SENDER_NUMBER: ${SOLAPI_SENDER_NUMBER:-}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    volumes:
      - upload-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql-data:
  upload-data:
