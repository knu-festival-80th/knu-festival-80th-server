name: Update OpenAPI Spec

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize]
  # develop 으로 직접 push 되거나 main→develop 역머지로 spec 변경이 누락되는 경우를 방지.
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # PR 트리거에서는 head_ref, push 트리거에서는 ref_name (develop) 사용.
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate OpenAPI spec
        run: ./gradlew generateOpenApiDocs --no-daemon

      - name: Format JSON
        run: python3 -m json.tool docs/openapi.json > docs/openapi.tmp && mv docs/openapi.tmp docs/openapi.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/openapi.json
          if ! git diff --cached --quiet; then
            git commit -m "docs: openapi.json 자동 갱신"
            git push
          else
            echo "No changes to openapi.json"
          fi
