spring:
  application:
    name: festival
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
    show-sql: ${JPA_SHOW_SQL:false}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  task:
    scheduling:
      pool:
        size: 4
      thread-name-prefix: scheduler-

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

phone:
  encryption-key: ${PHONE_ENCRYPTION_KEY}
  lookup-hash-key: ${PHONE_LOOKUP_HASH_KEY}

solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender-number: ${SOLAPI_SENDER_NUMBER:}

admin:
  master-password: ${ADMIN_MASTER_PASSWORD}

app:
  # 외부에 노출되는 베이스 URL. DB의 상대 경로를 완전한 URL로 만들 때 prefix 로 쓴다.
  # - 로컬 dev: http://localhost:8080
  # - 운영: ingress 도메인 (예: https://chcse.knu.ac.kr/festival/api)
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  upload:
    # 업로드 파일을 저장할 로컬 디렉터리. 컨테이너에서는 볼륨 마운트 경로.
    base-dir: ${UPLOAD_BASE_DIR:./uploads}
    # 정적 리소스로 노출되는 URL prefix.
    url-prefix: /uploads

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    kr.ac.knu.festival: DEBUG
