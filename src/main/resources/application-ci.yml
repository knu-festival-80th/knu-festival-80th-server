spring:
  datasource:
    url: jdbc:h2:mem:ci;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

phone:
  encryption-key: ci-only-encryption-key-32bytes-min
  lookup-hash-key: ci-only-lookup-hash-key-32bytes-min

admin:
  master-password: ci-master-password
